<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Certificado</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #eef2f3;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.certificate {
  background: white;
  padding: 40px;
  width: 800px;
  border: 12px solid #c9a94d;
  border-radius: 12px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  text-align: center;
  position: relative;
}

/* LOGO CENTRADO */
.logo {
  display: block;
  margin: 0 auto 25px auto;
  width: 110px;
  opacity: 0.95;
}

/* MARCA DE AGUA */
.certificate::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: url('logo.png') no-repeat center;
  background-size: 300px;
  opacity: 0.05;
  width: 100%;
  height: 100%;
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.name {
  font-size: 28px;
  font-weight: bold;
  margin: 20px 0;
}

.text {
  font-size: 18px;
  margin: 10px 0;
}

.highlight {
  font-weight: bold;
}

.valid-box {
  margin-top: 25px;
  padding: 15px;
  border: 2px solid green;
  border-radius: 8px;
  color: green;
  font-weight: bold;
}

.footer {
  margin-top: 40px;
  display: flex;
  justify-content: space-between;
}

.signature {
  text-align: center;
  font-size: 14px;
}

.line {
  width: 200px;
  border-top: 1px solid black;
  margin: 5px auto;
}
</style>

</head>

<body>

<div class="certificate">

  <!-- TU LOGO -->
  <img src="logo.png" class="logo">

  <h1>CERTIFICADO DE PARTICIPACIÓN</h1>

  <div class="text">Otorgado a:</div>

  <div class="name">DANNA SOFIA ARJONA NAVARRETE</div>

  <div class="text">
    Por su participación en la asamblea de <br>
    <span class="highlight">WorldSkills 2026</span>
  </div>

  <div class="text">
    Realizado el 24 de abril de 2026 en Punta Cana
  </div>

  <div class="valid-box">
    ✔ Certificado visible en esta página  
    ✔ Nombre: Danna Sofia Arjona Navarrete  
  </div>

  <div class="footer">
    <div class="signature">
      <div class="line"></div>
      Firma autorizada
    </div>

    <div class="signature">
      <div class="line"></div>
      Dirección del evento
    </div>
  </div>

</div>

</body>
</html>
