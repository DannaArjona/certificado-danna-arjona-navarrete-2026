<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Verificación de Certificado</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 350px;
    }
    .status {
      color: green;
      font-weight: bold;
      font-size: 18px;
      margin: 10px 0;
    }
    .code {
      margin-top: 15px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>🔐 Certificado Verificado</h2>
  
  <p><strong>Nombre:</strong> Danna Arjona</p>
  <p><strong>Evento:</strong> WorldSkills Punta Cana</p>
  <p><strong>Fecha:</strong> 22 - 24 Abril 2026</p>
  <p><strong>Participación:</strong> Networking</p>

  <div class="status">✅ Certificado válido</div>

  <div class="code">Código: WS-2026-45821</div>
</div>

</body>
</html>
